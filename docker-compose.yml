version: "3.8"

services:
  db:
    image: postgres:18-alpine
    container_name: postgres-web
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webDB
    ports:
      - "4777:5432"
    volumes:
      - pgdata_18:/var/lib/postgresql
    networks:
      - postgres_net

volumes:
  pgdata_18:

networks:
  postgres_net:
    driver: bridge
