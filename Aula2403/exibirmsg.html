<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercicio 1</title>
</head>
<body>
    <button id="botao">Clique para mostrar uma mensagem</button>
    <script>
        const botao = document.getElementById("botao");
        function imprimeBatata() {


            window.alert("Olá eu sou uma mensagem");
        }
        botao.addEventListener('click', imprimeBatata);
    </script>
</body>
</html>
